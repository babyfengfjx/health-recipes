<h2 class="calibre5" id="sigil_toc_id_62">调理考前心烦紧张睡不好的饮方<span class="charoverride">——</span>莲子甘草茶</h2>
			<p class="calibre3">大考临近，考生心里的紧张感会越来越强，心火往往变旺。此时正是初夏，天气越来越热。内热外火夹在一起，有些孩子舌头就长出溃疡来了。晚上睡觉觉得心里烦热，翻来覆去睡不好。这时候，可以给孩子喝一道清心助眠茶。</p>
			<p class="calibre3"><b class="calibre4">莲子甘草茶</b></p>
			<p class="calibre3"><span class="calibre104">做法：</span><span class="calibre105">莲子心2克，甘草3克，沸水冲泡。</span></p>
			<p class="calibre3"><span class="calibre104">特别功效：</span><span class="calibre105">调理心烦失眠。</span></p>
			<p class="calibre3"><span class="calibre104">保健功效：</span><span class="calibre105">生津止渴，清心火。</span></p>
<p class="calibre3"><span class="calibre105"><br class="kindle-cn-toc-level"/></span></p>
<p class="calibre3"><span class="calibre105"><br class="kindle-cn-toc-level"/></span></p>
