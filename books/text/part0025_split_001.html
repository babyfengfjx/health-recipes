<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第二章：处暑</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">8月22日或23日-9月7日、8日或9日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">处暑，意味着暑气到此而止。此时晚上出门散步，</span></p>
			<p class="calibre3"><span class="calibre12">凉风习习，拂在身上非常惬意，堪称“新凉直万金”。</span></p>
			<p class="calibre3"><span class="calibre12">此时天气渐渐干爽，秋意已有，但夏季的湿气还未全消，</span></p>
			<p class="calibre3"><span class="calibre12">还需用饮食彻底送走盘踞在人体下焦的顽固的湿气，</span></p>
			<p class="calibre3"><span class="calibre12">因此，我们不仅要补脾气，还要补足肾气。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
