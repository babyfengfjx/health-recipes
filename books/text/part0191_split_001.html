			<h1 class="calibre110" id="sigil_toc_id_53"><span class="calibre120">第六章：</span>让孩子吃得香、身体好、更聪明</h1>
		</div>
		<div id="_idContainer304" class="kindle-cn-toc-level">
			<p class="calibre3" xml:lang="en-US"><span class="calibre11">小孩儿的脾胃比较娇嫩，现在的孩子吃的东西都特别有营养，不容易消化，所以调养孩子的消化功能是家长的重要功课。消化功能好，孩子营养吸收好，才能长得结实、聪明，而且还不容易生病。</span></p>
</div>
