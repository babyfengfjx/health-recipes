<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第五章：寒露</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">10月8日或9日—10月23日或24日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">秋天的第三个月，有些朋友晚上有时睡不着了，</span></p>
			<p class="calibre3"><span class="calibre12">或者睡着了，在半夜时分又会醒来，之后翻来覆去再难入睡，</span></p>
			<p class="calibre3"><span class="calibre12">等到天快亮了，才又昏昏沉沉地睡去。</span></p>
			<p class="calibre3"><span class="calibre12">如果您不只是在交寒露节气的一两天出现这种状况，</span></p>
			<p class="calibre3"><span class="calibre12">而是连续地出现，那就说明您肝血亏虚了，需要尽快调养。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
