<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第二章：雨水</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre7">2月18日或19日—3月5日或6日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">雨水节气的时候，冰雪在消融，江河在解冻，气温应该回暖了，</span></p>
			<p class="calibre3"><span class="calibre12">但北方人有句老话，叫作“下雪不冷化雪冷”，</span></p>
			<p class="calibre3"><span class="calibre12">因为雪化的时候，会吸收大量的热量，再加上北方经常会有冷空气光顾，还会带来寒潮南下，这就是人们形容的春寒。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
