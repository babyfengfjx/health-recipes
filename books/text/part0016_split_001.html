<div class="kindle-cn-toc-level">
			<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第三章:<span class="calibre17">芒种</span></h1>
		</div>
		<div id="_idContainer392" class="kindle-cn-toc-level">
			<div class="kindle-cn-toc-level"><span class="calibre18">6月6日或7日—6月21日或22日</span></div>
<p class="calibre3"><span class="calibre12">交芒种节气开始，我们就进入夏天的第二个月——仲夏。仲夏之月，阳气到了顶点。当阳气到了顶点的时候，我们的生命也到了生长的高峰期，身体的新细胞会长得非常快。</span></p>
			<p class="calibre3"><span class="calibre12">如果您想保持青春，延缓衰老，仲夏之月是关键时期。如果您在这段时间保养不好，就丧失了一年中修复人体老化的最宝贵机会。</span></p>
		</div>
