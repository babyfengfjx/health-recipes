<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第五章：清明</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre7">4月4日、5日或6日—4月19日、20日或21日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">假如我们从立春开始，一直坚持做排毒的工作，坚持打开气的通道，</span></p>
			<p class="calibre3"><span class="calibre12">那么，到了清明的时候，也会感到自己的身体非常清明；</span></p>
			<p class="calibre3"><span class="calibre12">如果我们冬天的养藏工作没做好，春天的排毒工作也做得不彻底的话，</span></p>
			<p class="calibre3"><span class="calibre12">这时候就很容易被流行的各种病毒所侵扰。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
