<h1 class="calibre110" xml:lang="en-US" id="calibre_pb_0"><span class="calibre67">第六章：</span>只有投资健康，才有终生回报<br class="calibre66"/></h1>
<p class="calibre3"><span class="calibre11">在我看来，人的一生中，最值得投资的就两样东西：一是孩子的教育，二是身体和内心的健康。好好地投资在这两件事上面，你获得的将是一生的回报。</span></p>
