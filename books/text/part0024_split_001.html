<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第一章：立秋</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">8月7日、8日或9日—8月22日或23日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">一夏无病三分虚。</span></p>
			<p class="calibre3"><span class="calibre12">夏天的热很伤气，而且那个时候也吃不下很多东西。</span></p>
			<p class="calibre3"><span class="calibre12">到了立秋，就要补回来。</span></p>
			<p class="calibre3"><span class="calibre12">“立秋贴秋膘”，“贴”的不是肥肉，而是人体的精气。</span></p>
			<p class="calibre3"><span class="calibre12">其实，就是给人体补气、补能量。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
