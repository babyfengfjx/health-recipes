<div id="_idContainer108" class="kindle-cn-toc-level"><h2 id="sigil_toc_id_1" class="calibre56">向一切阻挡生机的行为说不</h2>
<p class="calibre3"><br class="kindle-cn-toc-level"/></p>

			<blockquote class="kindle-cn-blockquote1"><span class="calibre11">春天是“养生”的季节，要靠肝来生发阳气，促进人体的生长发育。“生发”，意味着“生生不息”。所以，要“舒肝理气”，不要补肝，而要健脾、补脾。饮食应以排毒、抗毒为主。宜少吃酸，多吃甘。</span><br class="kindle-cn-toc-level"/></blockquote>
