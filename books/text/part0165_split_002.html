<div id="_idContainer1213" class="kindle-cn-toc-level"><h2 id="sigil_toc_id_104" class="calibre56">养好“种子”，方能喜迎来年</h2>
<div class="kindle-cn-toc-level"><br class="kindle-cn-toc-level"/></div>
</div>

		
		<div id="_idContainer1112" class="kindle-cn-toc-level">
			<blockquote class="kindle-cn-blockquote1"><p class="calibre3"><span class="calibre11">冬，代表的是终止的意思，也就是一年结束了。 “天地不通，闭而成冬。” 万物闭藏，这就是终止。</span><br class="kindle-cn-toc-level"/></p>
			<p class="calibre3"><span class="calibre11">所以冬天养生宜静养，宜反思，宜补肾。如果这一年你忙忙碌碌，亏待了身体，那更要把握好冬天这个机会，好好给身体补一下。只有养好“种子”，才有资格喜迎来年。</span><br class="kindle-cn-toc-level"/></p>
</blockquote>
</div>
