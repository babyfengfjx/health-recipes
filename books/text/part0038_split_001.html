<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第五章：小寒</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">1月5日或6日—1月19日或20日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">从小寒节气开始进入残冬，</span></p>
			<p class="calibre3"><span class="calibre12">这一个月，我们防的主要是下半身的寒。</span></p>
			<p class="calibre3"><span class="calibre12">如果您出门，一定要穿特别保暖的鞋子，</span></p>
			<p class="calibre3"><span class="calibre12">以防寒气从脚下侵袭身体，导致我们体内寒湿夹杂。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
