<div class="kindle-cn-toc-level">
			<div id="_idContainer747" class="calibre41"><h1 class="calibre44" id="calibre_pb_0">第六章：<span class="calibre17">大暑</span></h1>
</div>
<div class="kindle-cn-toc-level"><span class="calibre18">7月22日、23日或24日—8月7日、8日或9日</span></div>
		</div>
		<div id="_idContainer748" class="kindle-cn-toc-level">
			<p class="calibre3"><span class="calibre12">夏天的最后半个月是最难熬的日子，因为此时暑气到了极致。</span></p>
			<p class="calibre3"><span class="calibre12">湿和热夹杂在一起，使人感觉特别闷热。暑气会“困”住五脏的机能，而且还伤心气，因为心脏需要加倍工作来帮助人体散热。</span></p>
			<p class="calibre3"><span class="calibre12">为了防止暑气伤人，我们要喝一道茶饮——银花甘草茶；</span></p>
			<p class="calibre3"><span class="calibre12">吃一道凉菜——甜杏仁拌茴香。</span></p>
		</div>
		<div id="_idContainer749" class="kindle-cn-toc-level">
			<p class="calibre3"><br class="kindle-cn-toc-level"/></p>
</div>
