			<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第四章：<span class="calibre17">夏至</span></h1>
<div class="kindle-cn-toc-level"><span class="calibre18">6月21日或22日—7月7日或8日</span></div>
<p class="calibre3"><span class="calibre12">夏至节气，阴气开始升起，我们除了继续春夏养阳这门大功课之外，还要开始来养护阴气的一点点萌芽，也要吃养阴的食物，特别要吃麦子、鸭蛋和桑葚这三种养阴食物。</span></p>
