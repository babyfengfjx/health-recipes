<div id="_idContainer441" class="calibre35"><h2 id="sigil_toc_id_28" class="calibre56">想不老，就要在夏天好好地“长”一“长”</h2>
<p class="calibre3"><br class="kindle-cn-toc-level"/></p>

			<blockquote class="kindle-cn-blockquote1"><span class="calibre11">“夏”字在古代有“大”的意思，因为夏季是万物长大的季节，也是人体快速生长的季节，正是《黄帝内经》中所说的养长之时。如果我们能充分地“长”，那么就能有效地延缓身体衰老的速度。</span><br class="kindle-cn-toc-level"/>
			<p class="calibre3"><span class="calibre11">所以想要保持青春的话，就一定要在夏天好好地来“长”一“长”。重点是养两脏：一是心，二是肺。</span></p>
</blockquote>
