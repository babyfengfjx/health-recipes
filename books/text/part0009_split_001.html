<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第六章：谷雨</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre7">4月19日、20日或21日—5 月5 日或6 日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">谷雨节气这十五天，是春天的最后半个月，</span></p>
			<p class="calibre3"><span class="calibre12">这时候容易出现咽痛、眼睛发红、血压升高的症状；</span></p>
			<p class="calibre3"><span class="calibre12">女性容易出现经期综合征，感觉烦闷，精神不集中，容易疲劳等。</span></p>
			<p class="calibre3"><span class="calibre12">这时，在谷雨时节上市的好东西——绿茶、蜂蜜、陈皮可以帮到我们。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
