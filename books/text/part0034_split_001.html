<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第一章：立冬</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">11月7日或8日—11月21日或22日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">立冬之后进补，叫作补冬，因为天气马上就转冷了，</span></p>
			<p class="calibre3"><span class="calibre12">得给身体添把火。在立冬这天，南方人讲究吃羊肉汤锅，</span></p>
			<p class="calibre3"><span class="calibre12">北方人一般吃羊肉馅儿的饺子，当然这两种吃羊肉的方法都很不错。</span></p>
			<p class="calibre3"><span class="calibre12">但是我们要记住一点，不管怎么吃羊肉，一定要放胡椒粉。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
