<div id="_idContainer103" class="kindle-cn-toc-level">
			<h2 class="calibre5" id="sigil_toc_id_9">春天，人的心情应该像草木一样舒展</h2>
			<p class="calibre3">肝和胆组成肝系，是属木的，在一年四季中，<span class="calibre104">春天是万物萌发的季节，属木，是肝气最旺的时候。那人的心情也应该像草木一样，舒展开来，尽情地沐浴阳光雨露，这就是最自然的养肝之道。</span></p>
			<p class="calibre3">这个季节，如果你心里有所喜，就尽量不要去压抑它。想做什么事，就大胆地去做，不要瞻前顾后。想吃什么东西，就大胆地去吃，不要担心发胖，因为你的心情舒展了，顺应了春天的生发之气，新陈代谢就会加速的，吃下去的东西会更多地转换成能量，让你精神十足。</p>
<p class="calibre3"><br class="kindle-cn-toc-level"/></p>
<p class="calibre3"><br class="kindle-cn-toc-level"/></p>
