<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第二章：小雪</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">11月22日或23日—12月6日或7日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">到了小雪节气，天地之气就完全分开了，</span></p>
			<p class="calibre3"><span class="calibre12">这叫作阴阳不通、天地闭藏，也就是说，</span></p>
			<p class="calibre3"><span class="calibre12">大自然已经完成了一年的春生夏长秋收的工作，</span></p>
			<p class="calibre3"><span class="calibre12">要进入冬藏了，要休息了。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
