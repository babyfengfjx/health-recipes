<h1 class="calibre110" id="calibre_pb_0"><strong class="calibre130"><span class="calibre14">叁·秋季</span></strong></h1>
<h2 id="_idContainer869" class="kuangjia"></h2>
<h2 id="sigil_toc_id_70" class="calibre131">该转身换一种<span class="calibre67">活法了</span></h2>

			<blockquote class="kindle-cn-blockquote1"><p class="calibre3"><span class="calibre11">秋天到了，别再吃寒湿的东西，免得伤了脾，脾湿则生痰湿，从而引起咳嗽。《黄帝内经》里有一句“秋伤于湿，冬必咳嗽”，说的是同样的道理。因为我们的身体随着季节的转换，已然悄悄地在变，该是转身换一种活法的时候了，此时，阳气要开始往回收了，饮食也要随之调整。</span><br class="kindle-cn-toc-level"/></p>
			<p class="calibre3"><span class="calibre11">怎么调整呢？请注意这三点：</span><br class="kindle-cn-toc-level"/></p>
			<p class="calibre3"><span class="calibre11">（1）秋不食瓜。这个瓜指的是西瓜。西瓜是夏天的水果，现在要少吃了。立秋后大量吃西瓜，很伤脾，容易引发秋季的慢性腹泻，或是腹部发胖。</span><br class="kindle-cn-toc-level"/></p>
			<p class="calibre3"><span class="calibre11">（2）吃应季的酸味水果，如桃子、葡萄，可护肝养血。</span><br class="kindle-cn-toc-level"/></p>
			<p class="calibre3"><span class="calibre11">（3）减少凉菜。</span><br class="kindle-cn-toc-level"/></p>
</blockquote>
