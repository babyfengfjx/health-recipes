<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第三章：白露</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">9月7日、8日或9日—9月的22日或23日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">露从今夜白，月是故乡明。</span></p>
			<p class="calibre3"><span class="calibre12">白露时，季节转换非常明显，人的心情也随之变化，容易悲秋。</span></p>
			<p class="calibre3"><span class="calibre12">见秋月，便起归乡之意；见秋露，便有人生无常之感。</span></p>
			<p class="calibre3"><span class="calibre12">这些秋天的忧思伤的是五脏中的肺。</span></p>
			<p class="calibre3"><span class="calibre12">秋风凉，白露时早晚温差大，风寒也会袭肺。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
