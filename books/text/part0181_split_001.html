					<p class="calibre3" xml:lang="en-US"><span class="calibre144">人吃五谷，生百病。有太多太多的毛病都是我们自己吃出来的。要想调理好身体，首先需要考虑的，不是“我应该吃什么”，而是“我应该不吃什么”。</span></p>
