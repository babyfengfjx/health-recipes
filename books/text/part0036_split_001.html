<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第三章：大雪</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">12月7日或8日—12月20、21或22日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">从大雪节气开始，我们就进入一年中最适合大补的一个月，</span></p>
			<p class="calibre3"><span class="calibre12">古人也把这个月叫作畅月。这个月天地间的万物都在收藏，</span></p>
			<p class="calibre3"><span class="calibre12">要把精华充实于自己的内部。人也是一样，</span></p>
			<p class="calibre3"><span class="calibre12">要通过大补来充实自己的身体。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
