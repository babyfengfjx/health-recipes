<h1 class="calibre110" xml:lang="en-US" id="calibre_pb_0"><span class="calibre67">第四章：</span>会吃蜂蜜、蜂王浆、花粉的人不会老<br class="calibre66"/></h1>
<p class="calibre3"><span class="calibre11">蜂蜜的来源是花蜜。花蜜是百花的精华，它在采集时混合了蜜蜂分泌的酶，就像人类酿造的酒、酱、醋一样，经过了营养转化的过程，因而更加滋补，更容易被人体吸收。</span></p>
