<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第四章：秋分</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">9月22日或23日—10月8日或9日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">秋分节气时，如果您每天很早醒来，说明夏天没有养好，伤气伤阴了。这个秋冬季要多吃银耳、莲子、墨鱼干、枸杞等</span></p>
			<p class="calibre3"><span class="calibre12">滋阴补气的食物给身体补回来。</span></p>
			<p class="calibre3"><span class="calibre12">春夏养得好不好，从秋分开始会逐渐反映出来。</span></p>
			<p class="calibre3"><span class="calibre12">龙星潜伏，一年的养生，到此要来一个大转弯了。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
