<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第六章：大寒</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">1月20日或21日—2月4日或5日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">大寒节气是二十四节气中最后一个节气，</span></p>
			<p class="calibre3"><span class="calibre12">过完大寒这半个月就是立春。</span></p>
			<p class="calibre3"><span class="calibre12">大寒节气的时候不仅要进补，要暖身，</span></p>
			<p class="calibre3"><span class="calibre12">还要提前排出身体中的湿气。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
