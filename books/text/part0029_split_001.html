<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第六章：霜降</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre48">10月23日或24日—11月7日或8日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">过完这个节气就渐渐过渡到了冬天的萧瑟景象，</span></p>
			<p class="calibre3"><span class="calibre12">昆虫都“闭关”了，河水干枯，</span></p>
			<p class="calibre3"><span class="calibre12">人体内就表现为缺乏水液滋养，特别是血液。</span></p>
			<p class="calibre3"><span class="calibre12">在这段时间，我们要注意滋养肝血，</span></p>
			<p class="calibre3"><span class="calibre12">可以喝一道双莲墨鱼汤。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
