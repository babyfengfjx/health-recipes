<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第四章：冬至</h1>
			<div class="kindle-cn-toc-level"><span class="calibre11"><span class="calibre52">12月21日、22日或23日—1月4日或5日</span></span></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3"><span class="calibre12">冬至进补，有平时三倍的功效。</span></p>
			<p class="calibre3"><span class="calibre12">我们在冬至之前，最好着手做三件事情:</span></p>
			<p class="calibre3"><span class="calibre12">第一，每天注意观察自己身体的状况。</span></p>
			<p class="calibre3"><span class="calibre12">第二，准备补心养阳汤的材料。</span></p>
			<p class="calibre3"><span class="calibre12">第三，喝两天葱姜萝卜皮汤。</span></p>
			<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p></body></html>
