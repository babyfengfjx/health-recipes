			<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第五章：<span class="calibre17">小暑</span></h1>
<div class="kindle-cn-toc-level"><span class="calibre18">7月7日或8日—7月22日、23日或24日</span></div>
<p class="calibre3"><span class="calibre12">夏天是长的时节，要集中精力来长。如果这时候分神、分心去做一些复杂的事情，就会影响到人体在夏天的长，影响到夏天的生养之气。小暑节气，是一个不适宜剧烈活动的时节。</span></p>
			<p class="calibre3"><span class="calibre12">小暑节气人会大量出汗，热得难受，但也是非常好的给身体排毒的时机。</span></p>
			<p class="calibre3"><span class="calibre12">从小暑节气开始，我们借助天时来让身体排毒，就能达到事半功倍的效果。</span></p>
