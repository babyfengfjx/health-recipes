<h1 class="calibre110" xml:lang="en-US" id="calibre_pb_0"><span class="calibre67">第三章：</span>吃糖的智慧<br class="calibre66"/></h1>
<p class="calibre3"><span class="calibre11">每种糖的作用是不一样的。我们在饮食中用到糖时，就要提醒自己：糖，不光是一个调味剂，不是加点儿甜调口味那么简单，它自有它的作用。如果糖加错了，不但没效果，有时还会适得其反。</span></p>
