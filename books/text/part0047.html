<div class="kindle-cn-toc-level"><b class="calibre4">作者小传</b></div>
<p class="kindle-cn-toc-level" style="margin:0pt; border:0pt; height:1em"> </p>
			<p class="calibre3">陈允斌，出身中医世家，公共营养师，简易食疗、顺时养生的倡导践行者，中央电视台及全国多家电视台专家嘉宾。</p>
			<p class="calibre3">其外曾祖父是二十世纪前期的地方名医，乐善好施。因有感于当时的穷人看不起病，更无钱抓药，以致小病延误成大病，遂潜心研究简便低廉的食疗方，数十年救人无数。</p>
			<p class="calibre3">已出版备受读者欢迎的《陈允斌抗病毒应急食方》《茶包小偏方，喝出大健康》《吃法决定活法》《回家吃饭的智慧》《外公家书》《顺时生活》系列日历等居家必备好书。</p>
