<div id="_idContainer001" class="kindle-cn-toc-level">
			<h1 class="kindle-cn-toc-title" id="calibre_pb_0">第一章：<span class="calibre17">立夏</span></h1>
<div class="kindle-cn-toc-level"><span class="calibre18">5月5日或6日— 5月20日、21日或22日</span></div>
<p class="calibre3"><span class="calibre12"><br class="kindle-cn-toc-level"/></span></p>
<p class="calibre3"><span class="calibre12">为了更好地夏长，我们要从立夏这一天开始打基础，要好好地来补一补肾气。</span></p>
			<p class="calibre3"><span class="calibre12">立夏节气这十五天，我们的补养重点就是固摄肾气，以防夏天的炎热耗伤人体的正气，而肾气就是正气的主要部分。</span></p>
</div>
