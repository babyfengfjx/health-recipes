<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养生智慧 - 顺时而养，健康常伴</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=1777514361">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="top-nav">
            <div class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span class="brand-text">养生智慧</span>
            </div>
            <div class="nav-actions"></div>
        </header>

        <!-- 主页内容 -->
        <main class="main-content" id="mainContent">
            <!-- 搜索区 -->
            <section class="search-hero">
                <h1 class="hero-title">今天想调理什么？</h1>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <span class="search-icon" onclick="clickSearch()" style="cursor:pointer" title="点击搜索">🔍</span>
                        <input type="text" id="mainSearch" placeholder="输入症状、食材、方子名称..." autocomplete="off">
                        <button class="search-btn" onclick="clickSearch()">搜索</button>
                        <div class="search-suggestions" id="searchSuggestions"></div>
                    </div>
                </div>
            </section>

            <!-- 今日节气卡片 -->
            <section class="seasonal-card" id="seasonalCard">
                <div class="seasonal-header">
                    <span class="seasonal-date" id="seasonalDate"></span>
                    <span class="seasonal-term" id="seasonalTerm"></span>
                </div>
                <p class="seasonal-tip" id="seasonalTip"></p>
                <div class="seasonal-actions">
                    <button class="seasonal-btn" onclick="showSeasonalRecipes()">查看节气食方 →</button>
                </div>
            </section>

            <!-- 快捷入口：症状导航 -->
            <section class="quick-entry">
                <h2 class="section-title">
                    <span class="title-icon">🎯</span>
                    按症状查找
                </h2>
                <div class="symptom-categories" id="symptomCategories">
                    <!-- 动态生成 -->
                </div>
            </section>

            <!-- 热门调理 -->
            <section class="hot-remedies">
                <h2 class="section-title">
                    <span class="title-icon">🔥</span>
                    热门调理
                </h2>
                <div class="symptom-cards" id="hotSymptoms">
                    <!-- 动态生成 -->
                </div>
            </section>

            <!-- 内容类型切换 -->
            <section class="content-types">
                <div class="type-tabs" id="typeTabs">
                    <button class="type-tab active" data-type="recipe">
                        <span class="tab-icon">🍵</span>
                        <span class="tab-name">食疗方子</span>
                        <span class="tab-count" id="recipeCount">0</span>
                    </button>
                    <button class="type-tab" data-type="article">
                        <span class="tab-icon">📚</span>
                        <span class="tab-name">养生文章</span>
                        <span class="tab-count" id="articleCount">0</span>
                    </button>
                    <button class="type-tab" data-type="acupoint">
                        <span class="tab-icon">👆</span>
                        <span class="tab-name">穴位按摩</span>
                        <span class="tab-count" id="acupointCount">0</span>
                    </button>
                    <button class="type-tab" data-type="exercise">
                        <span class="tab-icon">🧘</span>
                        <span class="tab-name">养生功法</span>
                        <span class="tab-count" id="exerciseCount">0</span>
                    </button>
                </div>
            </section>

            <!-- 简化筛选器 -->
            <section class="simple-filters" id="simpleFilters">
                <div class="filter-row">
                    <span class="filter-label">季节</span>
                    <div class="filter-tags" id="seasonTags"></div>
                </div>
            </section>

            <!-- 内容列表 -->
            <section class="content-list">
                <div class="list-header">
                    <span class="result-count">共 <strong id="totalCount">0</strong> 条</span>
                    <button class="sort-btn" id="sortBtn">按季节排序 ▾</button>
                </div>
                <div class="items-grid" id="itemsGrid">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>正在加载养生智慧...</p>
                    </div>
                </div>
                <div class="load-more" id="loadMore" style="display:none">
                    <button class="load-more-btn" onclick="loadMore()">加载更多</button>
                </div>
            </section>
        </main>
    </div>

    <!-- 症状导航页（覆盖层） -->
    <div class="symptom-nav-overlay" id="symptomNavOverlay" style="display:none" onclick="closeSymptomNav()">
        <div class="symptom-nav-content" onclick="event.stopPropagation()">
            <div class="symptom-nav-header">
                <h2>选择你的症状</h2>
                <button class="close-btn" onclick="closeSymptomNav()">✕</button>
            </div>
            <div class="symptom-search">
                <input type="text" id="symptomSearch" placeholder="搜索症状...">
            </div>
            <div class="body-systems" id="bodySystems">
                <!-- 动态生成身体系统分类 -->
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="detailModal" style="display:none" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">详情</h2>
                <div class="modal-actions">
                    <button class="action-btn" onclick="shareItem()">
                        <span class="action-icon">📤</span>
                        <span class="action-text">分享</span>
                    </button>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>

    <script src="app.js?v=1777514361"></script>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
</body>
</html>
